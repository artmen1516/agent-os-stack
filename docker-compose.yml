services:
  # Ollama Cloud Gateway
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always

  # LiteLLM Gateway
  litellm:
    # Using v1.82.9 (Verified clean after the March 24th incident)
    image: litellm/litellm:v1.82.3-stable.patch.2
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always

  # OpenFang Agent OS
  openfang:
    image: fliva/openfang:v0.4.0
    container_name: openfang
    ports:
      - "4200:4200"
    volumes:
      # We map the whole data dir to the container's /data
      - ./openfang_data:/data
    environment:
      - LITELLM_URL=http://litellm:4000
    depends_on:
      - litellm
    restart: always